name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          - os: windows-latest
            target: bun-windows-x64
            suffix: windows-x64.exe
          - os: macos-latest
            target: bun-darwin-arm64
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Embed reader assets
        run: bun scripts/embedAssets.js

      - name: Build monolithic binary
        run: bun build --compile --target=${{ matrix.target }} ./bin/epub2site.js --outfile epub2site-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub2site-${{ matrix.suffix }}
          path: epub2site-${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
